<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FunFit | Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>

    <div class="login-wrapper">
        <div class="login-card fade-in">

            <!-- LEFT SIDE -->
            <div class="card-left">
                <div class="brand-header">
                    <i class="fa-solid fa-dumbbell brand-icon"></i>
                    <span class="brand-name">FunFit</span>
                </div>

                <div class="hero-content">
                    <h1>Level Up Your <br>Fitness</h1>
                    <p>Track your habits, earn rewards, and stay consistent.</p>
                </div>

                <div class="illustration-placeholder">
                    <div class="ring ring-1"></div>
                    <div class="ring ring-2"></div>
                    <i class="fa-solid fa-person-running runner-icon"></i>
                </div>
            </div>

            <!-- RIGHT SIDE -->
            <div class="card-right">
                <div class="form-header">
                    <h2>Welcome Back</h2>
                    <p>Login to continue your journey</p>

                    <!-- 🔴 Flash Message -->
                    {% with messages = get_flashed_messages() %}
                    {% if messages %}
                    <div style="color: red; margin-top: 10px;">
                        {{ messages[0] }}
                    </div>
                    {% endif %}
                    {% endwith %}
                </div>

                <form action="/login" method="POST" class="login-form">

                    <div class="input-group">
                        <i class="fa-regular fa-envelope input-icon"></i>
                        <input type="email" name="email" placeholder="Email Address" required>
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input id="password" type="password" name="password" placeholder="Password" required>
                        <i class="fa-regular fa-eye-slash toggle-password" title="Show/Hide Password"></i>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>

                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary">Login</button>
                        <a href="/signup" class="btn btn-outline">Sign Up</a>
                    </div>

                </form>

                <div class="divider">
                    <span>or continue with</span>
                </div>

                <div class="social-login">
                    <button class="btn-social">
                        <i class="fa-brands fa-google"></i> Google
                    </button>
                    <button class="btn-social">
                        <i class="fa-brands fa-apple"></i> Apple
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- 🔹 Password Toggle Script -->
    <script>
        const toggle = document.querySelector(".toggle-password");
        const password = document.getElementById("password");

        toggle.addEventListener("click", () => {
            if (password.type === "password") {
                password.type = "text";
                toggle.classList.remove("fa-eye-slash");
                toggle.classList.add("fa-eye");
            } else {
                password.type = "password";
                toggle.classList.remove("fa-eye");
                toggle.classList.add("fa-eye-slash");
            }
        });
    </script>

</body>

</html>
