<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FunFit | Generating Plan...</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{url_for('static',filename='/css/loading.css')}}">
</head>

<body>

    <div class="bg-layer">
        <div class="glow-shape shape-1"></div>
        <div class="glow-shape shape-2"></div>
        <div class="glow-shape shape-3"></div>
    </div>

    <div class="loading-wrapper fade-in">

        <div class="logo">
            <i class="fa-solid fa-dumbbell"></i> FunFit
        </div>

        <div class="animation-container">
            <div class="spinner-ring"></div>
            <div class="spinner-pulse"></div>
        </div>

        <h1 class="loading-title">Generating Your Diet Plan...</h1>
        <p class="loading-subtitle">Our AI is analyzing your data to create the perfect personalized plan.</p>

        <div class="dynamic-text-wrapper">
            <div class="dynamic-text-slider">
                <div class="text-slide">Calculating daily calorie needs...</div>
                <div class="text-slide">Analyzing activity level & goals...</div>
                <div class="text-slide">Selecting optimal macro ratios...</div>
                <div class="text-slide">Finalizing your custom plan... <i class="fa-solid fa-check text-cyan"></i></div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar-fill"></div>
        </div>

    </div>
    <script>
        setTimeout(function () {
            window.location.href = "{{ url_for('diet') }}";
        }, 10000);
    </script>
</body>

</html>
